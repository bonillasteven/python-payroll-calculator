<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steven Python Payroll Calculator</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 40px;
      font-size: 1.1rem;
    }

    .button {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.1rem;
      transition: 0.3s ease;
    }

    .button:hover {
      background: #1d4ed8;
      transform: scale(1.02);
    }

    .footer {
      margin-top: 30px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Python Payroll Calculator</h1>
    <p>
      A Python payroll calculator project built with Python, GitHub, and Streamlit.
      Calculate overtime pay, taxes, deductions, net pay, and annual salary estimates.
    </p>

    <a class="button" href="https://github.com/bonillasteven/python-payroll-calculator" target="_blank">
      View GitHub Repository
    </a>

    <a class="button" href="https://python-payroll-calculator-bifa9nhs3dp5qz8dbbyaet.streamlit.app/">
      Use Live Payroll Calculator
    </a>

    <div class="footer">
      Built by Steven Bonilla
    </div>
  </div>
</body>
</html>
